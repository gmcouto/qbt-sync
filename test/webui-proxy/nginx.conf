# Minimal reverse proxy: host -> edge network -> nginx -> internal_network -> qBittorrent.
# qBittorrent containers stay on internal_network only (no internet).

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Docker embedded DNS — required so upstream hostnames are re-resolved after
    # container recreate (otherwise nginx caches an old IP → 502 / connection refused).
    resolver      127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Master WebUI (container listens on 9080)
    server {
        listen 80;
        location / {
            set $qbt_master_upstream qbt-master;
            proxy_pass http://$qbt_master_upstream:9080;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            client_max_body_size 256m;
        }
    }

    # Child WebUI (container listens on 9081)
    server {
        listen 81;
        location / {
            set $qbt_child_upstream qbt-child;
            proxy_pass http://$qbt_child_upstream:9081;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            client_max_body_size 256m;
        }
    }
}
