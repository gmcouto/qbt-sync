# qbt-sync configuration
# Copy this file to config.yaml and adjust the values.

master:
  host: "http://192.168.1.10:8080"
  username: admin
  password: adminadmin
  # Optional base path for torrent data on the master instance.
  # Used together with a child's "path" to translate torrent paths.
  # path: "/media/torrent"

  # Optional tracker filters (regex, matched against the tracker URL).
  # Applied right after the bulk torrent load, before any processing.
  # Torrents excluded here are invisible to all children.
  # tracker_include:
  #   - "tracker\\.allowed\\.com"
  # tracker_exclude:
  #   - "tracker\\.ignored\\.com"

children:
  - name: child1
    host: "http://192.168.1.11:8080"
    username: admin
    password: adminadmin
    # Optional base path for torrent data on this child.
    # When both master.path and child.path are set, torrent paths are
    # translated: the master prefix is replaced with this child prefix.
    # Example: master path /media/torrent + child path /mnt/data/torrent
    #   /media/torrent/downloads/movie.mkv → /mnt/data/torrent/downloads/movie.mkv
    # path: "/mnt/data/torrent"

    # When enabled, path changes are applied by deleting and re-adding the
    # torrent instead of calling setSavePath. Use this when the child mounts
    # storage read-only: qBittorrent rejects setSavePath on read-only paths,
    # but torrents_add with skip_hash_check works because no files are moved.
    # readd_on_relocate: false

    # Optional tracker filters (regex, matched against the tracker URL from
    # the master torrent list). Both are lists of patterns.
    #
    # tracker_include: only sync torrents whose tracker matches at least one
    # pattern. If omitted/empty, all trackers are included.
    #
    # tracker_exclude: skip torrents whose tracker matches any pattern.
    # Applied after include.
    #
    # Examples:
    # tracker_include:
    #   - "tracker\\.mysite\\.com"
    # tracker_exclude:
    #   - "tracker\\.public\\.example\\.com"

  # Add more children as needed:
  # - name: child2
  #   host: "http://192.168.1.12:8080"
  #   username: admin
  #   password: adminadmin

sync:
  # Only sync torrents that have been seeding for at least this many minutes.
  min_seeding_time_minutes: 10

  # Skip hash verification when adding torrents to children.
  # Safe when children mount the same storage as master.
  skip_hash_check: true

  # Only sync torrents that belong to private trackers.
  # When enabled, public torrents on master are completely ignored as if they
  # don't exist. Uses the isPrivate field from the bulk torrent list, so
  # there is no performance overhead. Requires qBittorrent 5.0+.
  private_only: true

  # Sync deselected files from master to existing child torrents.
  # When disabled, file selections are still applied to newly added torrents,
  # but the expensive bulk load of all master file priorities is skipped.
  # WARNING: Enabling this requires fetching file priorities for every torrent
  # individually even for calculating small diffs, which can make each sync 
  # cycle easily take 30 minutes when you have thousands of torrents.
  sync_file_selections: false

  # Treat paused/stopped torrents on master as if they were removed.
  # When enabled, any torrent that is paused or stopped on master will be
  # deleted from child instances during sync.
  treat_stopped_as_removed: false

  # When running with --daemon, wait this many minutes between sync cycles.
  daemon_run_interval_minutes: 15

  # Preview changes without applying them. Set to false to actually sync.
  # Can also be overridden with --no-dry-run on the CLI.
  dry_run: true
